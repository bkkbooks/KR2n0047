body:
  text: 石經考異卷下翰林院編修杭世駿撰蜀石經朝公武郡齊讀書志云石經周易周易指略例共十一卷僞蜀廣政辛亥孫逢吉書說卦乾健也以下有韓康伯注略例有邢璹注此與國子監本不同者也以蜀中印本校邢璹注略例不同者又百餘字詳其意義似石經誤而無它本訂正姑兩存焉趙希辨附志云周易十卷經注六萬六千八百四十四字將仕郎守國子助教臣楊鈞朝議郎守國子毛詩博士柱國臣孫逢吉書曽惇石刻鋪叙云周易四冊十二卷又略例一卷正經二萬四千五十二字注四萬二千七百九十二字廣政十四年辛亥仲夏刋石尚書十三卷僞蜀周德貞書經文有祥字皆闕其畫亦闕民字之類蓋孟氏未叛唐時所刋也以監本校之禹貢雲土夢作乂倒土夢字盤庚若網在綱皆作網字沈括筆談云雲土夢作乂太宗時得古本因改正以綱為網未知孰是附志云經注并序八萬一千九百四十四字將仕郎試祕書郎臣周德貞書鐫玉冊官陳德超鐫十石刻鋪叙云尚書四册正經二萬六千二百八六字注四萬八千九百八十二字毛詩二十卷僞蜀張紹文書與禮記同時刻石附志云經注一十四萬六千七百四十字將仕郎試祕書省校書郎張紹文書十石刻鋪叙云毛詩八冊正經四萬一千二十一字注萬五千七百一十九字鐫工張延族周禮十二卷僞蜀孫朋吉書以監本是正其注或羡或脫或不同至千數附志云周禮十卷經注一十六萬三千一百單三字將仕郎試祕書省校書郎孫朋吉書萬石刻鋪叙云周禮九册正經五萬五百八字注十一一千五百九十五字儀禮十七卷闕文獻通考不載附志云經注一十六萬五百七十三字將仕郎試祕書省校書郎張紹文書二石刻鋪叙云儀禮八册十六卷正經五萬二千八百字注七萬七千八百九十一字禮記二十卷僞蜀張紹文書不載年月經文不闕諱當是孟知祥僭位之後也首之以月令題云御刪定蓋明皇也林甫等注蓋李林甫也其餘篇第仍舊附志云經注十九萬六千七百五十一字字石刻鋪叙云禮記十册正經九萬八千五百四十五注十萬六千四十九字左氏傳三十卷不題所書人姓氏亦無年月按文不闕唐諱及國朝諱而闕祥字當是孟知祥僭位後刋石也附志云經注并序三十四萬五千八百四十四字七石刻鋪叙云左氏傳二十八册序一千六百一十字經傳十九萬七千二百六十五字注十四萬六千九百六十二字蜀鐫至十七卷止公羊傳十二卷皇朝田況皇祐初知成都日刋石國史藝文志云僞蜀刻五經備注傳為世所稱以此言觀之不應無公穀豈初有之後散毁耶附志云經注一十三萬一千五百一十四字不題所書人姓氏注石刻鋪叙云公羊六册傳四萬四千七百三十八字七萬七千三十七字畢工於皇祐元年已丑元月望日師臣樞密直學士京兆郡開國侯田況益州路諸州水陸轉運使曹潁叔提㸃益州路刑獄孫長卿暨倅僉皆鐫銜於石成都志又謂公榖田況所刻穀梁傳十二卷其後不載年月及所書人姓氏按文不闕唐及僞蜀諱而闕恆字以故知刋石當在真宗以後意者亦是田況也附志云經注八萬一千六百二十字不題所書人姓氏注石刻鋪叙云穀梁六册傳四萬一千八百九十字三萬九千七百三十字論語十卷僞蜀張德鈞書闕唐諱立石當在孟知祥未叛之前其文脫兩字誤一字又述而第七舉一隅下有而示之三字三人行必有我師焉上又有我師衛靈公第十五敬其事而後其食作後食其祿與李鶚本不同者此也附志云經注并序三萬五千三百六十八字將仕郎前守簡州平泉縣令兼殿中侍御史賜緋魚袋張德釗書潁川郡陳德謙鐫字五石刻鋪叙云論語三册序三百七十二字正經一萬千九百十三字注一萬九千四百五十四字廣政七年四月九日校勘孟子十四卷皇朝席旦宣和中知成都刋石置於成都學宫云僞蜀時刻六經於石而獨無孟子經為未備夫經大成於孔氏豈有闕耶其論既繆又多誤字如以頻顣為類不可勝計附志云不題經注字數若干亦不題所書人姓氏運石刻鋪叙云孟子十二卷宣和五年九月帥席貢暨判彭慥方入石踰年乃成計四册子鮚崎亭偶記云朝氏自說之拾擬孟之緒餘請去孟於講筵故公武亦有此論可為偏乖之甚禮記爾雅皆列學宫今獨齗齗於孟子是何心與孟蜀時七篇未登於經其不備宜也宋初已作正義矣席旦又何謬之有孝經一卷闕附志云經注并序四千九百八十五字不題所書人姓氏但題潁川郡陳德謙鐫字一石刻鋪叙云孝經一册二卷序四百三十九字正經千七百九十八字注二千七百四十八字蓋蜀廣政七年三月二日右僕射毋昭裔以雍經石本校勘簡州平泉令張德釗書爾雅三卷闕附志云將仕郎前守簡州平泉縣今賜緋魚袋張德釗書武令升鐫不題經注字數若干石刻鋪叙云爾雅一册二卷廣政七年甲辰六月右僕射毋昭裔置鐫者武令升讀書附志云以上石室十三經蓋孟昶時所鐫故周易後書廣政十四年嵗次辛亥五月二十日唯三傳至皇祐初方畢故公羊傳後書大宋皇祐元年嵗次己丑九月辛卯朔十五日乙巳工畢又書將仕郎試國子四門助教州學講說何維翰將仕郎試祕書省校書郎州學說書黃柬儒林郎試祕書省校書郎守華陽縣尉州學勾當工尚哲朝奉郎祕書省著作佐郎簽署節度判官㕔公事武騎尉管勾州學華參奉直郎尚書屯田員外郎通判軍州兼管內橋道勸農事及提舉渠堰騎都尉借緋提舉州學解程朝奉郎尚書屯田員外郎通判軍州兼管內勸農事及提舉渠堰輕車都尉借緋提舉州學聶世卿提㸃益州路諸州軍刑獄兼本路勸農提舉渠堰公事朝奉郎尚書比部員外郎護軍借紫孫長卿益州路諸州水陸計度轉運使兼本路勸農使朝奉郎尚書刑部員外郎直史館上騎都尉賜緋魚袋借紫曹潁叔樞密直學士朝散大夫右諫議大夫知益州軍州事兼管內橋道勸農使充益利路屯駐駐泊本城兵馬鈐轄提舉益利路諸州軍兵甲巡檢賊盜公事上騎都尉京兆郡開國侯食邑一千户賜紫金魚袋田況容齊續筆云成都石本諸經其字畫亦皆精謹唯三傳至皇祐元年方畢工殊不逮前王應麟困學紀聞云後蜀石經於高祖太宗諱皆闕書唐之澤深矣楊慎丹鉛録云蜀刻九經最為精確是時僭據之主惟昶有文學故蜀不受兵又饒文士故其所製尤善朱子論語注引石經者謂孟蜀石經也石刻鋪叙云考異一册乾道六年庚寅三月旦東里朝公武校石經與監本不同者作為此書易五書十詩四十七周禮四十二儀禮三十一禮記三十二左傳四十六公羊二十二穀梁二十三孝經四論語八爾雅五孟子二十七此正經不同者如此傳注不與古文尚書三册三卷蓋唐天寶未廢古書前傳本中汲郡呂大防得之於宋次道王仲至家乃元豐五年壬戌鏤板乾道六年庚寅帥朝公武取以入石教官張大固等監刋益郡石經肇於孟蜀廣政悉選士大夫善書者模丹入石七年甲辰孝經論語爾雅先成時晉出帝改元開運至十四年辛亥周易繼之實周太祖廣順元年詩書三禮不書嵗月逮春秋三傳則皇祐元年九月訖工時我宋有天下已九十九年矣通蜀廣政元年肇始之日凡一百一十二祀成之若是其囏又七十五年宣和五年癸卯益帥席貢始凑鐫孟子運判彭慥繼其成乾道六年庚寅朝公武又鐫古文尚書暨諸經考略洪文敏公邁謂孟蜀所鐫字體清謹有貞觀遺風續補經傳殊不逮前且引魏徴虞世南相繼為祕書監日請選五品以上子孫工書者為書手蓋欲字畫清婉可以傳久是以自經傳以後非士大夫所書皆不著姓氏若漢石經今不易得好古者所藏僅十數葉蜀中又以翻刋入石黃長睿謂開元中藏拓本於御府以開元二字小印印之是𤣥宗時已罕得況今又六百年後邪范成大石經始末記云石經已載前記朝子止乃作考異考異之作大抵以監本參校互有得失其間顛倒缺訛所當辨正然古今字畫雖少不同而實通用耳考異并序凡二十一碑具在石經堂中席益成都府學石經堂圖籍記云僞蜀廣政七年其相毋昭裔按雍都舊本九經命平泉令張德釗書而刻諸石本朝因禮殿以祀孔子為宫其旁置學官弟子講習傳授故蜀帥尚書右丞胡公宗愈作堂於殿之東南隅以貯石經李石石經室詩云我來一登石經堂從以諸生行兩廡諸生讀經半頭白問以始終箝不語我聞此經昔中都中郎所隸乃其祖邇來離亂已亡失楷本僅能傳蜀土蜀土閏位供掃除獨此仍為盛時取為將嚴鐍守重扄護以繚垣崇邃宇列之學宫豈無意豈但闕文存夏五大開明鏡别妍媸時扣洪鐘諧律呂後生不復事丹鉛抵死唯知守藤楮字音隨口妄霓霓㸃畫分毫謬魚魯日月當天空委照盲俗相欺紛莫覩石經雖古奈爾何人競傳今不傳古行行矧肯捩眼覷蘚剝苔封費撐拄堅鑱僅免飽蟫魚隘道爭來宅狐鼠此間鄒人儻借問為問石經誰是主一作敵門肆訶斥幾度向牆誇傴僂登登閣閣隱金槌聒耳散空垂雹雨蠟薰煤染連作卷玉軸錦裝如束杵豈無一物媚權豪幾紙才堪博圭組爾之所得固么䯢我則何由寬擊拊一捶只作一字訛訛至萬千那復數石經之害此其大縱有鬼神郍可禦憶昔嘗為博士官首善堂中容接武心知不是世間書雲漢森然城百堵恢恢帝所有餘地忍使石經留外府便當連舸下瞿塘飛上三山如插羽縑緗舛謬鐘鼎暗天罅豈容無一補巍巍玉帝殿中央河洛東西翼龍虎雖然斯文屬興廢帝既有心天亦許作詩未用擬韓公考篆庶幾追石鼓胡元質蜀石經跋云石經歷年多更變故陵遷谷變煨燼剝食之餘甚至取為柱礎為炮石者張縯云後周伐齊毁碑以為炮石不知何據唐初魏鄭公首訪求之十得其一況於今哉兹來少城得墜刻於一二故家雖間斷不齊然殘圭裂璧亦可寶也因以鑱之錦官西樓庶幾補古之闕文云爾名勝志云成都石經石凡千數胡元質宗愈作堂以貯之名石經堂在府學宇文紹奕跋云側置給事內翰胡公每以天下自任推六經精微寓諸日用至於屋壁所藏殘編斷刻收拾無遺常嘆石經隸畫最古旁搜博訪合諸家所藏得蔡中郎石經四千二百七十字有奇以楷書釋之又得古文篆隸三體石經遺字八百一十九並鑱諸石永貽不朽王象之輿地碑目云石本九經在成都府學曹學佺四川名勝志云諸刻今皆不存所存者孔門七十二子像石經禮記有數段在合州賓館中吳任臣十國春秋云毋昭裔河中龍門人蜀左僕射以太子太師致仕常按雍都舊本九經命張德釗書之刻石於成都學宫孫逢吉成都人廣政中纍官國子毛詩博士校定石經分刻蜀中逢吉與句中正之功尢多宋開封石經朱翌猗覺寮雜記云本朝石經胡恢所書恢行事詳沈括筆談楊慎丹鉛總録云淳化中刻今猶有存者錢塘王延年嘗考開封石經云宋史仁宗命秦王廷美曽孫克繼與朝臣分隸石經丹陽謝飶善隸㑹國子監立石經召為直講又宣和書譜閩人章友直工玉箸篆法與楊南仲篆石刻於國子監而藝文志有楊仲南五經七十五卷是皆宋開封立石經之明驗也顧唐石經在西安府學者斑斑可考而宋竟無片石傳於人間意二帝北狩時盡為金人所攜去耳金劉彥宗於侵宋日謂宗翰宗望曰遼太宗入汴載路車法服石經以歸令則也二帥納之是其徴已江都汪祚云草窗癸辛雜識汴學即昔時太學舊址九經石板堆積如山一行篆字一行真字則臨安亡而開封之石經猶存也未得據金史之言為證然汴當元時未嘗有所屠剃如楊髠臨安之禍則石板之亡當在元末不然明初周邸剪桐其地世擅儒雅不應及見石經而聽其忽焉以亡也宋高宗御書石經石刻鋪叙云靖康丁未夏四月皇宋中興高宗即大位改元建炎至紹興十三年癸亥通十九年金狄侵凌干戈之日居多乃能親御翰墨作小楷以書周易尚書毛詩春秋左傳全帙又節禮記中庸儒行大學經解學記五篇章草語孟悉送成均九月甲子左僕射秦檜請鐫石以頒四方卷末皆刋檜跋語潛說友咸淳臨安志云光堯石經之閣孝宗皇帝御書扁淳熙四年詔臨安府守臣趙磻老建閣奉安石經以墨本置閣上葉紹翁四朝聞見録云高宗御書六經嘗以賜國子監及石本於諸庠上親御翰墨稍倦即命憲聖續書至今皆莫能辨李心𫝊建炎以來朝野雜記云憲聖慈烈吳太后讀書萬卷翰墨尤絶人萬歷杭州府志云正德十二年巡按監察御史宋廷佐檄知府留志淑遷仁和縣學石經於㦸門外兩偏道統十三贊於尊經閣下大學士丹徒楊一清為記曰監察御史朝郡宋君廷佐奉命按治浙江之暇嘗求所謂石經者曰在仁和學因往視之多斥棄瓦礫中曰噫嘻此南宋太學中故物也胡傾斥至是哉乃進杭州府知府晉江留君志淑問其故留君稽閲志籍蓋宋高宗初渡江都臨安即詔建學養士紹興二年手書易書詩春秋論孟中庸儒行諸篇刻石於學京兆尹趙磻老建尊經閣以儲之二十四年復製宣聖洎顔曽以下七十二賢贊并李伯時舊所繪像皆刻石置之學理宗紹定五年又以所製伏羲以來道統贊刻之附諸石經之末宋亡學廢元西僧楊璉真伽謀運致諸石為寺塔址賴亷訪經歷申屠致逺之力而止然亦僅存其半矣後改學為西湖書院諸殘碑實在焉國朝洪武十二年即書院建仁和學宣德二年巡按御史海虞吳公訥慨石經殘缺屬知府盧王潤收集之得全刻及斷毁者若干分麗其中天順三年改建縣學於今所其諸石悉徙以從四十年於兹宋君曰嵗久而廢物理固然惟兹盛典廢莫之興則有由矣豈不以學宫専崇於郡涖兹土者朔望廟謁春秋釋奠亦惟知有郡學縣雖有學概莫之至焉知所謂石經者而葺之乃檄府命移置諸石於府學焉屬留君理其事又命通判咸寧喬遷董工役因徙圖像於尊經閣下甃以瓴甓石經及表忠觀諸碑則徙於櫺星門北之兩偏周廊覆之既甃既堅其屋之數左二十有二楹右如之石之數圖像十有五贊八易二書七詩十春秋四十有八論孟中庸十有九表忠觀諸碑十有四既訖工留君具書肅使者謁豫記慨惟經書之在世猶日麗天水行地不假形器而存與天地同悠久者也顧秦燔漢鑿之餘不絶如線非常之變或出於意料之所不及有斯文之責者不得不憂託諸貞石以夀於無窮亦維持世道計耳漢中郎筆跡已不可見唐長安石經實與臨安後先並美今長安故無恙而仁和學宫獨委棄至此凡吏於兹士於兹者將不均有責哉夫高宗之為君復讎撥亂慙德多矣史稱其博學強記繼體守文有足嘉者理宗之嗣統無足齒録然能表章先賢崇正學變士習功不可少觀其所以圖不朽者而其所存可知已書家李斯鍾繇雖畔道君子猶取其長歐虞以降殘碑裂石至一宫觀一浮屠之微世寶之如金玉矧兹文教所關非崇長異端游心末技者比是固可重而高宗之書精麗有法置之名家中亦烏可棄哉抑又聞長安古石刻尚多散漫不一往往為都民鑱鑿以至磨滅宋韓縝修霸橋督工急民磨碑石以供罹此二厄存者遂鮮後直移至西安郡庠保全至今夫寺塔之厄略同霸橋而郡學之遷其設心行事正相類雖物之興廢有數然振厲修改每存乎其人必有儒者之心而後能及此其他非惟不肯為亦固有不暇為者矣宋君讀書好古其所猷為務關風教留君志足以承上才足以濟世而任勞於下又有通判喬君故一指畫之間而百年之廢墜以集是固可書而謂後之人有復不能嗣守而保厥成者則非今日之所知矣正德十二年秋七月立沈儀兩湖麈談云舊仁和學宋嶽公飛第也飛被禍後第為太學元為西湖書院至我朝為縣學在按察司西今之學天順末移建則貢院基也學有理宗御書道統十三贊高宗御書四書五經李龍眠先聖暨七十二賢像并高宗贊碑刻皆太學故物也正德辛未巡按張公承仁欲遷置府學賴學諭南寧李公璧懇留而止至戊寅巡按宋公廷佐卒遷之時李已升任無有敢能言之者矣自宋迄今四百年而此碑始不為吾庠所有物豈亦有數哉朱彞尊杭州府學宋石經跋云宋高宗皇帝御書石經紹興十三年知臨安府事張徴摹勒上石淳熙四年詔知府趙磻老建閣於太學題曰光堯石經之閣置石其下洪邁曾惇楊冠卿葉紹翁李心𫝊陳騤王應麟潛說友紀之詳矣宋亡學廢為肅政亷訪司治所西僧楊璉真伽造白塔於行宫故址取其石壘塔杭州路廉訪經歷申屠致逺力持不可然已損其什一元至正間即治所西偏建西湖書院以祀先師設有山長掌書庫其後明常熟吳訥乾州宋廷佐先後巡按浙江或覆之廊或甃以瓴甋崇禎末廊圯乃嵌諸壁中左易二書六詩十有二禮記向有學記經解中庸儒行大學五篇今惟中庸片石存爾其南則理宗大書御製序四碑在焉右則春秋左氏傳四十八碑闕其首卷通計八十七碑諸經雖非足本然書法甚工學古者所當藏弆若夫秦檜一跋已為訥椎碎其詞見於學士院中興紀事本末君子無取也石經考異卷下
