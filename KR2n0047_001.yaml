body:
  text: 石經考異卷上翰林院編修杭世駿撰石經考異者何以補亭林顧氏之考也蓋衆説之齟齬者莫石經若矣史傳異地志異碑刻異唐宋元明諸家之辨證異顧氏述矣而不詳詳矣而不辨豫特引而疏通之又自唐開成以後其事少略豫特取而補綴之文雖近創而義則實因汲古之士其不以豫為勦説也夫雍正十三年太嵗在乙卯二月朔仁和杭世駿書延熹五經後漢蔡雍傳及張馴傳皆云奏求正定六經文字而靈帝紀云詔諸儒正五經文字儒林傳序云詔諸儒正定五經刻於石碑盧植傳云時始立太學石經以正五經文字李巡傳云乃白帝與諸儒共刻五經文於石考雍傳注引洛陽記亦祇有尚書周易公羊傳禮記論語晉羊欣筆法魏酈元水經注亦祇言五經意熹平四年雍等所奏求正定者六經暨光和六年書丹立石祇五經耳楊慎以光和六年為初刻熹平四年為再刻趙崡石墨鐫華因之是并忘光和在熹平之後可謂顛倒繆盩矣鄞縣全祖望云孔氏春秋正義謂漢初為傳訓者皆與經别行故石經書公羊傳並無經文按隋志别有一字春秋一卷在公羊傳九卷之外當是黃初時邯鄲淳書以補之也江都汪祚云中郎傳及張馴傳皆言正定六經而本紀儒林傳祇言五經隋志則有七經考當時所謂五經者易尚書禮記春秋而以論語參之獨無詩古之言五經者未之有也竊意雍等奏定六經蓋於五經之外增論語而為六而雍以光和元年言事被逐未及書詩於石而止同事雖有楊賜等而刋定裁正實出於雍故六年刻石告成竟無詩逮隋志有一字魯詩則謝山以為黃初所補者得之書碑姓氏蔡雍傳與五官中郎將堂溪典光祿大夫楊賜諫議大夫馬日磾議郎張馴韓説太史令單揚等奏求正定六經文字堂溪典見延篤傳注馬日磾見孔融傳注張馴在儒林傳韓説單揚在方術傳洪適隸釋石經論語殘碑末一行有云詔書與博士臣左立郎中臣孫表黃伯思東觀餘論石經公羊殘碑其末云溪典諫議大夫臣馬日磾臣趙域議郎臣劉𢎞郎中臣張文臣蘇陵臣傅楨雜溪上缺當是堂溪典也由二碑證之則當時奏求正定者祇雍等七人暨後立石又有左立孫表又有趙域等諸人也范史略之耳書丹不止蔡雍雍傳及水經注皆言雍自書丹於石使工鐫刻洛陽伽藍記亦言三種字石經漢右中郎將蔡雍筆之遺迹隋書經籍志亦言後漢鐫刻七經著於石碑皆蔡雍所書董逌廣川書跋乃云石經不盡蔡雍書如馬日磾輩相與成之洪適隸釋云今所存諸經字體各不同雖雍能分善隸兼備衆體但文字之多恐非一人可辦竊意其間必有同時揮毫者張縯石經跋云今六經字體不一當是時書丹者亦不獨雍也三字一字儒林傳序詔諸儒正定五經刋於石碑為古文篆隸三體書法以相參檢伽藍記亦稱漢國子學堂前有三種字石經二十五碑表裡刻之寫春秋尚書二部作篆科斗隸三種字後魏崔光傳光為祭酒請命博士李郁等補漢所立三字石經之殘缺劉芳傳亦云漢世造三字石經於太學江式傳亦云蔡雍採李斯曹喜之法為古今雜形歐陽棐集古録目亦稱石經遺字古文篆隸三體凡八百二十九字蔡雍書張舜民畫墁録邵伯溫聞見後録乃據雒陽發地所得石經以為蔡雍隸書趙明誠金石録則又以為蔡雍小字八分書而力辨儒林傳序古文篆隸三體之非黃伯思見公羊殘碑亦定以為鴻都一字石經而唐書藝文志祇有蔡雍今字石經論語唐以隸為今字也張縯又以為雍不能具三體書法於孔安國三百年之後或謂雍以三體參檢其文而書丹於碑則定為隸魏書江式傳云魏邯鄲淳建三字石經於漢碑之西其文蔚炳三體復宣校之説文篆隸大同而古字少異水經注及晉衛恆傳皆言魏正始中立古文篆隸三字石經獨隋經籍志乃言魏正始中又立一字石經疑於乖謬然考其目三字石經祇有尚書春秋而一字石經有周易有尚書有魯詩有儀禮有春秋有公羊傳有論語有典論與漢所立者不合故正始之碑仍不得遽以三字為斷胡三省注通鑑則又鑿指三字為魏所立亦似有理而顧氏獨不之採今特取而備論之其言曰范蔚宗時三體石經與熹平所鐫並列於學官故史筆誤書其事後人襲其訛錯或不見石刻無以考正趙氏雖以一字為中郎所書而未見三體者歐陽氏以三體為漢碑而未嘗見一字者近世方勺作泊宅編載其弟陶所跋石經亦為范史隋志所惑指三體為漢字至公羊碑有馬日磾等名乃云世用其所正定之本因存其名可謂謬論正始石經非邯鄲淳書魏書江式傳及北史皆言魏陳留邯鄲淳特善倉雅許氏字指八體六書精究間理以書教諸皇子又建三字石經於漢碑之西而衛恆四體書勢云魏初傳古文者出於邯鄲淳恆祖敬侯為寫尚書後以示淳而淳不别至正始中立三字石經轉失淳法因蝌蚪之名遂效其形水經注以迄晉書撰恆傳皆同此説胡三省并為計其年嵗云按此碑以正始年中立漢書云元嘉元年度尚命邯鄲淳作曹娥碑時淳已弱冠自元嘉至正始亦九十餘年或以三字為魏碑則是謂之邯鄲淳所書非也按魚豢魏略以董遇賈洪邯鄲淳薛夏隗禧蘇林樂祥等七人為儒宗傳其序曰黃初元年之後新主乃復始掃除太學灰炭補舊石碑之缺壞又邯鄲淳傳云黃初初以淳為博士給事中淳作投壺賦千餘言奏之文帝以為工賜帛千匹度淳在當時未必甚老或寫於黃初而刻於正始亦未可定不然熹平立石蔡雍馬日磾之名昭灼若此而魏世重刋竟不言書者姓氏是一闕也魏文帝典論水經注言魏文帝刋典論六碑立於石經之次裴松之注三國志云漢世西域舊獻火浣布中間久絶至魏初時人疑其無有文帝以為火性酷烈無含生之氣著之典論明其不然之事絶智者之聽及明帝立詔三公曰先帝昔著典論不朽之格言其刋石於廟門之外及太學與石經並以永示來世至齊王芳正始元年西域使至而獻火浣布焉於是刋滅此論而天下笑之松之昔從征西至洛陽歷觀舊物見典論石在太學者尚存而廟門外無之問諸長老云晉初受禪即用魏廟移此石於太學非兩處立也竊謂其言為不然愚按魏志明帝太和四年二月戊子以文帝典論刻石立於廟門之外酈元所云文帝刋之誤矣松之既稱刋滅此論又云典論石在太學者尚存而伽藍記亦云典論六碑至太和後魏孝文年號十七年猶有四存隋經籍志亦有一字石經典論一卷意當時所謂刋滅者第芟去火浣布一條至於六碑則仍列於太學故裴松之楊衒之等並得見也漢魏碑目漢立石經不言碑之數目洛陽記有四十六枚之語章懷即引以為注注引洛陽記曰論語二碑二碑毁當是論語三碑二碑毁乃合四十六枚之數劉貢父刋誤云當是一碑毁若二碑毁者當云皆毁而已是貢父之弗深考也伽藍記乃云石經二十五碑蔡雍遺迹猶有十八碑餘皆殘毁此漢石經目也若魏正始中所立酈道元與楊衒之皆云四十八枚而北齊文宣紀云蔡雍石經五十二枚蓋合漢魏言之第不深考誤云蔡雍也宋敏求河南志稱石經凡七十三碑蓋漢二十五魏四十八也此其碑數之異論其形製朱超石與兄書云石經文都似碑廣四尺此是漢碑水經注云石長八尺廣四尺此是魏碑論其位置洛陽記有西行南行東行之分此在堂東之西南東也是漢碑朱超石以為駢羅相接者是矣水經注言碑石四十八枚廣三十丈魏文帝又刋典論六碑附於其次此所謂樹之於堂西者也是魏碑第謝承范曄之書均謂立在太學門外而陸機酈元楊衒之均謂講堂前微有異耳隋書經籍志正誤隋書經籍志其中言石經一篇之中互異者數事張孟奇撰疑耀未暇致辨亭林顧氏又辨之未詳豫特援諸書以證之其云後漢鐫刻七經著於石碑皆蔡雍所書按雍等奏求正定六經文字而以五經書丹於石則石經在漢時從未有言七經者彼蓋見一字有周易有尚書有魯詩有儀禮有春秋有公羊傳有論語却合七經之數遂斷以為漢刻而不知其與范史魏書術藝傳水經注雒陽記諸書多不合其云後魏之末齊神武執政自洛陽徙於鄴都按後齊天保元年詔文襄所建蔡雍石經五十二枚即宜移置學館依次修立則鄴都之徙乃由文襄非關神武然善則歸親或可渾同言之至云行至河陽值岸崩遂沒於水其得至鄴者不盈太半按陸機洛陽記石經四部本碑凡四十六枚西行尚書周易公羊傳十二碑毁南行禮記十五碑悉崩壞東行論語二碑毁是晉時存者祇有一十九枚至酈道元注水經時正始石經有四十八枚後魏馮熙與常伯夫相繼為州廢毁分用大至頽落鄭道昭崔光皆表請料閲補綴皆見之本傳孝靜武定四年始移於鄴文宣受禪孝昭即位均令國子監施列當時稱有五十二枚然則徙鄴之役或有淪毁乃文宣孝昭之世其碑見存無闕所謂不盈太半豈非言者過歟其云至隋開皇六年又自鄴京載入長安置於祕書內省按後周宣帝紀大象元年詔徙鄴城石經於洛陽則開皇之初石經仍在洛陽或由洛陽轉徙長安耳若云自鄴京載入大象之徙豈為無是事乎遍稽諸史一事之顛末抵牾者衆矣鴻都學非太學張懷瓘書斷黃伯思東觀餘論朝公武石經考異皆稱鴻都一字石經非也按後漢靈帝紀光和元年始置鴻都門學生蔡雍傳初帝好學自造皇羲篇五十章因引諸生能為文賦者本頗以經學相招後諸為尺牘及工書鳥篆者皆加引召遂至數十人侍中祭酒樂松賈護多引無行趣藝之徒並待制鴻都門下陽球傳拜尚書令奏罷鴻都文學曰伏承有詔敕中尚方為鴻都文學樂松江覽等三十二人圖象立贊以勸學者又曰今太學東觀足以宣明聖化願罷鴻都之選以消天下之謗按水經注穀水又東徑開陽門南又東徑國子太學則太學在開陽門與鴻都逺矣獨怪當時待詔鴻都門下者若師宜官若梁鵠八分皆極一時之選何以光和六年立石不令寫經乃知二人特工蟲篆小技五經所以正天下訛謬偏傍增損之間度非一二俗生可了故曰雍自書丹使工鐫刻誠慎之也全祖望鮚崎亭偶記云北魏書江式表謂蔡雍刻石太學後開鴻都諸方獻篆無出雍者則鴻都固非太學而又可見師宜官諸人之盡遜於雍也雍以劾鴻都學生被譴而謂石經出於鴻都真大舛也魏太武無刻石經事南齊書魏虜傳佛狸於城西三里刻石寫五經及其國記於鄴取石虎文石屋基六十枚皆長丈餘以充用按魏收作後魏書皆據托跋一朝國史如鄧淵李彪等所撰即泰常太和兩次幸雒陽觀石經猶且大書特書何有五經刻石不夸張其事者蕭子顯生在江左不過得之傳聞其不足據也審矣矧神武秉政若平城既有太武石經何得又從雒陽轉徙三字石經即徙三字石經亦當云與太武所刋並列略而不言豈果收之疏漏哉顧考脫落北齊二條北齊書孝昭紀皇建元年詔文襄帝所運石經即宜施列於學館考第載文宣紀天保元年一條北史陸卬傳卬子久於五經最精熟館中謂之石經乂時待詔文林館也考第載後魏書劉芳傳一條劉芳陸卬事不足以證石經然觀當時稱謂則知偏傍音讀之不可不慎也唐藝文志所載石經與隋志不同唐書藝文志云今字石經易彖三卷與七録合隋志一卷今字石經尚書本五卷隋志六卷今字石經鄭玄尚書八卷七録同隋志無三字石經尚書古篆三卷七録十三卷隋志九卷又五卷今字石經毛詩三卷隋志魯詩六卷七録毛詩二卷今字石經儀禮四卷隋志九卷三字石經左傳古篆書十三卷七録十二卷隋志三卷今字石經左傳經十卷隋志一字春秋一卷今字石經公羊傳九卷隋志同蔡雍今字石經論語二卷七録同隋志一卷唯無典論其云今字者即一字也仁和趙信云公羊穀梁皆無正經故邯鄲淳書春秋正經一卷以補之唐志所云今字石經左傳經十卷即此以其専寫正經而不連左傳故稱為左傳經實則無左傳也其十卷則一卷之訛正經不應有十卷也石經毛詩梁時已亡安得至唐復出恐是魯詩之訛也唐石臺孝經陳振孫書録解題云唐明皇孝經注一卷始刻石太學御八分書末有祭酒李齊古所上表及答詔且具宰相等名銜實天寶四載號為石臺孝經乾道中蔡洸知鎮江以其本授教授沈必豫熊克使刻石學宫云唐石經唐文粹李陽冰論古篆願刻石作篆備書六經立於明堂為不刋之典號曰大唐石經使百代之後無所損益此論在當時雖未施行然已為鄭覃等開先矣朱彞尊唐國子學石經跋云唐國子學石刻九經易九卷二萬四千四百三十七字書十三卷二萬七千一百三十四字詩二十卷四萬八百四十八字周官禮十卷四萬九千五百十六字儀禮十七卷五萬七千一百十一字禮小戴記二十卷九萬八千九百九十四字春秋左氏傳三十卷十九萬八千九百四十五字公羊氏傳十卷四萬四千七百四十八字穀梁氏傳十卷四萬二千八十九字孝經一卷二千闕百闕十三字論語十卷一萬六千五百九字爾雅二卷一萬七百九十一字開成二年都檢校官銀青光祿大夫右僕射兼門下侍郎判國子祭酒同中書門下平章事太清宫使兼修國史上柱國滎陽郡開國公食邑二千户鄭覃勘定勒石本也新舊唐書載覃奏起居郎集賢殿學士周墀水部員外郎集賢殿直學士崔球監察御史張次宗禮部員外郎孔溫業四人校定又册府元龜載文宗命率更令韓泉充詳定官而題名於石者有四門館明經艾居晦陳玠又文學館明經不知名一人將仕郎守潤州句容縣尉段絳將仕郎守祕書省正字柏皓將仕郎守四門助教陳莊士朝議郎知沔王友上柱國賜緋魚袋唐元度朝議郎守國子毛詩博士上柱國章師道朝散大夫守國子司業騎都尉賜緋魚袋楊敬之并覃共十人顧國史所記者題名不書題名書者國史亦不紀不可解也新唐書選舉志云凡書學石經三體限三嵗王應麟玉海云後唐長興三年二月令國子監校正九經以西京石經本抄寫刻板頒天下此以石經本雕板之始也按舊唐書褚無量傳無量以舊庫內書自高宗代即藏在宫中漸致遺逸奏請繕寫刋校以𢎞經籍之遺葉夢得石林燕語稱栁玭序訓言其在蜀時嘗閲書肆所鬻字書小學率雕本則唐固有之若九經之有雕板實始後唐詳勘者馬鎬陳觀田敏也逮周廣順三年六月丁巳判監田敏又上十一經及爾雅五經文字九經字樣刻板皆四門博士李鶚書惟公羊前三禮為郭溪書至顯德二年又校勘經典釋文三十卷雕印命張昭田敏詳校餘詳胡應麟筆叢王應麟困學紀聞云唐儒宗傳序文宗定五經鑱之石張參是正訛文按文粹劉禹錫國學新修五經壁記云初大歷中名儒張參為司業始詳定五經書於論堂東西廂之壁序以參為文宗時誤矣參所定乃書於壁非鑱石也趙崡石墨鐫華云按六朝以前用分隸今石經皆正書且多用歐虞書法知其為唐人書矣禮記首月令尊明皇純字諱尊憲宗又知其非天寶以前人書矣然則今西安府學石經乃唐文宗時石經也舊在務本坊韓建築新城棄之於野朱梁時劉鄩用尹玉羽請遷故唐尚書省之西隅宋元祐中汲郡吕公始遷今學嘉靖乙卯地震石經倒損西安府學生員王堯惠等按舊文集其闕字别刻小石立於碑傍以便摹補又按唐書謂文宗朝石經違棄師法不足觀然其用筆雖出衆人不離歐虞褚薛法恐非今人所及惟王堯惠等補字大為紕繆今華下東生文豸家有乙卯以前拓本庶幾稱善焉右本喬景叔説朱彞尊宋京兆府學石經跋云京兆府學新移石經碑記宋元祐中京兆黎持撰文河南安宜之書鋟之者長安石工安民也其曰汲郡吕公者宣公大防之兄以工部郎中陜西轉運副使知陜州以直龍圖閣知秦州大忠也自唐鄭覃等勒石壁九經一百六十卷天祐中築新城石為韓建所棄劉鄩守長安幕吏尹玉羽請輦入城鄩謂非急務玉羽紿曰一旦敵兵臨城碎為矢石亦足以助戰鄩然之移至尚書舊省至大忠領漕日始克盡立於學載持記甚詳玉羽者京兆長安人以孝行聞杜門隱居鄩辟為保大軍節度推官仕後至唐光祿少卿晉高祖召之辭以老退歸秦中嘗著自然經五卷武庫集五十卷其書散見於册府元龜惜歐陽子不為立傳而其書亦不傳於世也錢塘符曽云亭林考金石文字謂開成石經左傳文公宣公卷字更濫惡而成字城字皆缺末筆穀梁襄昭定哀四公儀禮士昏禮皆然此為朱梁所補刻考宋劉從乂黎持二記但言韓建劉鄩移石而不言補刻然成字缺筆其為梁刻無疑按朱三篡竊西都備禦邠岐日不暇給况彼亦安知經學其時領佑國命者韓建而後王重師劉捍劉鄩康懷貞之徒亦非能留心於此者也竊意移石之舉皆出尹玉羽之力而自韓建委棄以來喪失必多則補刻者當即係玉羽此外更無其人張參五經文字書録解題云五經文字三卷唐國子司業張參撰大歷中刻石長安太學崇文總目云初參拜詔與儒官校正經典乃取漢蔡雍石經許慎説文吕忱字林陸德明釋文命孝亷生顔傳經抄撮疑互取定儒師部為一百六十非緣經見者皆略而不集乾符三年孫毛詩博士自牧以家本重校勘定刻字人魚宗會全祖望云孫毛詩博士自牧蓋參之孫也顧氏謂當作毛詩博士孫自牧誤張參五經文字序云凡一百六十部三千二百三十五字分為三卷説文體包古今先得六經之要有不備者求之字林其或古體難明衆情驚懵者則以石經之餘比例為助石經湮沒所存者寡通以經典及釋文相承隸省引而伸之不敢専也近代字樣多依四聲傳寫之後偏傍漸失今則采説文字林諸部以類相從務於易了不必舊次自非經典文義之所在雖切於時略不集録以明為經不為字也非常體偏有所合者詳其證據各以朱字記之俾夫觀省無至多惑玉海云大歷十年司業張參纂成五經文字以類相從開成中翰林待詔唐元度加九經字樣補所不載晉開運末祭酒田敏合二者為一編以考正俗體訛謬後周廣順三年六月田敏進印板九經書五經文字樣各二部一百三十册宋朝重和元年十一月二十八日言者謂張參唐元度所撰五經文字九經字樣辨證書名頗有依據然其法本取蔡雍石經許氏説文宜重加修定分次部類為新定五經字樣從之按中興書目五經文字五卷大歷十一年司業張參撰序曰詔委儒官勘校經本乃命孝廉生顔傳經收拾疑文互體受法師儒取説文字林蔡雍石經陸德明釋文為定例凡一百六十部非經典文義所在皆不集録顧氏既於九經字樣詳加採録獨於五經文字考中言之寥略夫二書皆附石經以傳皆有功於石經且五經文字為九經字樣之所從出焉得獨闕故書此補之書録解題云五經字樣一卷唐沔王友翰林待制唐元度撰補張參之所不載按此與九經字樣為兩書洪邁容齋三筆云書字有俗體一律不可復改者如沖涼況減決五字悉以水為冰雖士人札翰亦然玉篇正收入於水部中而冰部之末亦存之而皆注云俗乃知由來久矣唐張參五經文字亦以為訛朱彞尊五經文字跋云唐大歷十年有司上言經典不正取舍莫準乃詔儒官校定經本送尚書省并國子司業張參辨齊魯之音考古今之字詳定五經書於論堂東西廂之壁論堂者太學孔子廟西之夏屋也見舒元輿問國學記其初塗之以土而已太和間祭酒齊皥司業韋公肅易之以堅木擇國子通書法者繕寫而懸諸堂禮部郎劉禹錫為作記當時場屋至發題以試士文苑英華載有王履貞賦其略曰置六經於屋壁作羣儒之龜鏡又云一人作則京國儀型光我廊廟異彼丹青其推詡若此是書自土塗而木版自木板而刋石字已三易恐非參所書矣以豫論之唐人多専攻詩賦留心經義者寡參獨奉詔與孝亷生顔傳經取疑文互體鈎考而斷決之為士子楷式為功匪淺矣故禹錫記稱為名儒作史者宜以之入儒林傳而舊史新書俱不及焉按孟浩然集有送張參明經舉覲省詩錢起集有送張參及第還家作而郎官石柱題名參曽入司封員外郎之列蓋參在開元天寶間舉明經至大歷初佐司封郎尋授國子司業者也今其姓氏僅一見於宰相世系表一見於藝文志小學類他不詳焉闕事一也參謂讀書不如寫書度其書法必工故當時壁經羣儒奉為龜鏡縱不得與儒林之列書家姓氏亦宜載之而書苑書譜書史均未之及闕事二也壁經雖無存然參所定五經文字與唐元度九經字樣同刻石附九經之後歐陽永叔最嗜金石文字其序集古録云上自周穆王下更秦漢隋唐五代外至四海九州名山大澤窮崖絶谷荒林破冢神仙鬼物詭怪所傳莫不皆有乃獨唐所刻石經録中跋尾三百九十六篇此獨無有是唐刻石經永叔當日反失於摹拓未免類於昌黎韓子所云掎托星宿遺羲娥矣闕事三也今諸書皆有雕本獨五經文字九經字樣止有拓本無雕本闕事四也豫思漢魏石經既已湮沒惟唐開成本尚存參書幸附刋於石顧學者束諸高閣罕有遊目者故具書之顧炎武日知録云唐人以説文字林試士其時去古未逺開元以前未改經文之日篆籀之學童而習之今西安府所存唐睿宗書景龍觀鐘猶帶篆分遺法至於宋人其去古益逺而為説日以鑿矣大歷中張參作五經文字據説文字林刋正謬失甚有功於學者開成中唐玄度增補復作九經字樣石刻在關中今西安府學向無版本間有殘缺無别本可證近代有好事者刻九經補字并屬諸生補此書之缺以意為之乃不知此書特五經之文非經所有者不載而妄添經外之字并及字書中泛博之訓豫至關中洗刷元石其有一二可識者顯與所補不同乃知近日學者之不肯闕疑而妄作如此石經考異卷上
